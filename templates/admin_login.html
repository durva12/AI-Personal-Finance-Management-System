<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — FinanceAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
      width: 100%; max-width: 400px; padding: 40px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .badge { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3);
             border-radius: 8px; padding: 4px 12px; font-size: 0.78rem; font-weight: 600;
             display: inline-block; margin-top: 8px; letter-spacing: 0.05em; }
    h1 { color: #fff; font-size: 1.4rem; margin-top: 10px; }
    p { color: rgba(255,255,255,0.4); font-size: 0.83rem; margin-top: 4px; }
    .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 0.875rem;
             background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
    label { display: block; color: rgba(255,255,255,0.7); font-size: 0.82rem; font-weight: 500;
            margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      color: #fff; font-size: 0.9rem; outline: none; transition: border .2s; font-family: inherit;
    }
    input:focus { border-color: #ef4444; background: rgba(239,68,68,0.1); }
    input::placeholder { color: rgba(255,255,255,0.3); }
    .field { margin-bottom: 18px; }
    .btn {
      width: 100%; padding: 13px; border-radius: 10px; border: none; cursor: pointer;
      font-family: inherit; font-weight: 700; font-size: 0.95rem;
      background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; transition: all .2s;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(239,68,68,0.4); }
    .back { display: block; text-align: center; margin-top: 16px;
            color: rgba(255,255,255,0.4); font-size: 0.82rem; text-decoration: none; }
    .back:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div style="font-size:2.2rem">🔐</div>
    <div class="badge">ADMIN PORTAL</div>
    <h1>Administrator Login</h1>
    <p>Restricted access — authorised personnel only</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="field">
      <label>Admin Username</label>
      <input type="text" name="username" placeholder="admin" required>
    </div>
    <div class="field">
      <label>Admin Password</label>
      <input type="password" name="password" placeholder="Password" required>
    </div>
    <button type="submit" class="btn">🔒 Login as Admin</button>
  </form>
  <a href="{{ url_for('login') }}" class="back">← User Login</a>
</div>
</body>
</html>
